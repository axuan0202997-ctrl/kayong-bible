<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAYONG BIBLE - 16 SÁCH</title>
    <style>
        :root {
            --primary-red: #8b0000;
            --iron-gold: #ffd700;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--dark-bg);
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .search-container {
            margin-bottom: 20px;
            width: 100%;
            max-width: 500px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid var(--iron-gold);
            background: #222;
            color: white;
            font-size: 16px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        select {
            background-color: #333;
            color: var(--iron-gold);
            border: 1px solid var(--iron-gold);
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .content-area {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            border-top: 3px solid var(--primary-red);
            line-height: 1.6;
        }

        h2 { color: var(--primary-red); text-transform: uppercase; }
        .verse-num { color: var(--iron-gold); font-weight: bold; margin-right: 10px; }
    </style>
</head>
<body>

    <h2>KAYONG BIBLE</h2>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Tìm kiếm từ khóa trong Kinh Thánh..." onkeyup="searchFunction()">
    </div>

    <div class="controls">
        <label>Chọn Sách: 
            <select id="bookSelect">
                <option value="book1">Sách 1 (Ví dụ: Sáng Thế)</option>
                <option value="book2">Sách 2</option>
                <option value="book3">Sách 3</option>
                </select>
        </label>

        <label>Chương: 
            <select id="chapterSelect">
                <option>1</option>
                <option>2</option>
            </select>
        </label>
    </div>

    <div class="content-area" id="bibleContent">
        <p><span class="verse-num">1</span> Ban đầu Đức Chúa Trời dựng nên trời đất...</p>
        <p><span class="verse-num">2</span> Vả, đất là vô hình và trống không...</p>
    </div>

    <script>
        function searchFunction() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let content = document.getElementById('bibleContent');
            let paragraphs = content.getElementsByTagName('p');

            for (let i = 0; i < paragraphs.length; i++) {
                let text = paragraphs[i].innerText.toLowerCase();
                if (text.includes(input)) {
                    paragraphs[i].style.display = "";
                    paragraphs[i].style.backgroundColor = input !== "" ? "#444" : "transparent";
                } else {
                    paragraphs[i].style.display = "none";
                }
            }
        }
    </script>

</body>
</html>
